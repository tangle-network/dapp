[build]
  publish = "dist/apps/tangle-cloud"
  command = "yarn nx build tangle-cloud"

  # Trigger a master deploy whenever the app's own source, the shared
  # libs it consumes, or the workspace dep manifest changes. The previous
  # version gated on apps/tangle-cloud/CHANGELOG.md only, which silently
  # cancelled every push that wasn't a release-PR — a year of overhaul
  # work piled up un-deployed before we caught it. CHANGELOG.md is now
  # implicitly covered (it's inside apps/tangle-cloud/), and any source/
  # config/lockfile change also re-triggers.
  #
  # This `netlify.toml` is consumed by two sites that both build the same
  # app from this monorepo path:
  #   * tangle-cloud         → cloud.tangle.tools          (master, production)
  #   * staging-tangle-cloud → develop.cloud.tangle.tools  (develop, staging)
  # Each site is locked to a single branch via `allowed_branches`, so
  # `$BRANCH` is always either `master` or `develop` here. The diff-quiet
  # gate runs on both — pushes that don't touch the app, its libs, or the
  # workspace manifest are no-op skips on both prod and staging. Deploy
  # previews (PRs into develop) inherit the staging site and always build.
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- apps/tangle-cloud/ libs/ package.json yarn.lock tsconfig.base.json nx.json && exit 0 || exit 1"

# ─── Per-context environment ───────────────────────────────────────────
#
# Vite reads VITE_* vars at build time and inlines them into the bundle,
# so flipping one of these requires a rebuild — not a runtime config
# change. Setting the iframe kill-switch here keeps the source of truth
# in-repo and reviewable. Override per-branch by adding [context.<name>]
# blocks if we ever need to differ between staging and production.

[context.production.environment]
  VITE_ENVIO_TESTNET_ENDPOINT = "http://178.104.232.124/v1/graphql"
  # Production is iframe-on. Falls back to link-out automatically for any
  # blueprint that doesn't satisfy publisher + host + metadata gates, so
  # this flag is safe to leave on once the in-app trust gates are doing
  # their job. To disarm, flip to "false" and redeploy — single env flip
  # mass-disables every iframe app without an app-side change.
  VITE_BLUEPRINT_IFRAME_ENABLED = "true"

[context.deploy-preview.environment]
  VITE_ENVIO_TESTNET_ENDPOINT = "http://178.104.232.124/v1/graphql"
  # Preview deploys (PR builds) inherit production's iframe-on default
  # so contributors testing iframe-mode manifests on a PR-preview URL
  # see the same surface production users will.
  VITE_BLUEPRINT_IFRAME_ENABLED = "true"

[context.branch-deploy.environment]
  VITE_ENVIO_TESTNET_ENDPOINT = "http://178.104.232.124/v1/graphql"
  # Same default for any non-master branch deploy. The primary branch
  # deploy is `develop`, which serves as our staging environment.
  VITE_BLUEPRINT_IFRAME_ENABLED = "true"

# ─── Security headers ───────────────────────────────────────────────────
#
# Scope is intentionally narrow: we set ONLY the headers needed to harden
# the iframe blueprint-apps surface. We do NOT set default-src / script-src
# / connect-src here because the dapp's wallet, RPC, and IPFS connections
# require a permissive baseline that would be brittle to enumerate.
#
# - frame-src: allowlists which origins are permitted to be loaded as
#   iframe sources by the dapp. Belt-and-braces with the in-app gating in
#   policy.ts. Update both in tandem when adding a new iframe-eligible host.
# - frame-ancestors 'self': prevents the dapp itself from being framed by
#   an attacker page (clickjacking).
# - Permissions-Policy: denies sensitive Web APIs by default for the dapp
#   and any nested iframes. Each iframe element ALSO sets allow="" for
#   defence-in-depth.
# - X-Frame-Options: redundant with frame-ancestors on modern browsers but
#   still required by some legacy mobile webviews.
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "frame-src 'self' https://cloud.tangle.tools https://app.tangle.tools https://apps.tangle.tools https://*.blueprint.tangle.tools https://*.blueprint.tangle.sh; frame-ancestors 'self'"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=(), accelerometer=(), gyroscope=(), magnetometer=(), midi=(), serial=()"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ─── Cache headers ──────────────────────────────────────────────────────
#
# Vite emits hashed filenames into /assets, so the file at any given URL
# is content-addressed and safe to mark immutable. Repeat-visit loads
# become near-instant because the browser doesn't even revalidate.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fonts are also content-addressed when present; mark them immutable and
# permit cross-origin use so they can be loaded from sibling subdomains.
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

# index.html must NOT be cached aggressively — it's the entry point that
# references the hashed asset bundles, so it has to be replaced atomically
# on every deploy.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
