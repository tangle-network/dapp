[build]
  publish = "dist/apps/tangle-dapp"
  command = "yarn nx build tangle-dapp"

  # Trigger a master deploy whenever the app's own source, the shared
  # libs it consumes, or the workspace dep manifest changes. The previous
  # version gated on apps/tangle-dapp/CHANGELOG.md only, which silently
  # cancelled every push that wasn't a release-PR — production was stuck
  # on the August 2025 release until we caught it. CHANGELOG.md is now
  # implicitly covered (it's inside apps/tangle-dapp/), and any source/
  # config/lockfile change also re-triggers.
  #
  # This `netlify.toml` is consumed by two sites that both build the same
  # app from this monorepo path:
  #   * tangle-dapp         → app.tangle.tools           (master, production)
  #   * staging-tangle-dapp → develop.app.tangle.tools   (develop, staging)
  # Each site is locked to a single branch via `allowed_branches`, so
  # `$BRANCH` is always either `master` or `develop` here. The diff-quiet
  # gate runs on both — pushes that don't touch the app, its libs, or the
  # workspace manifest are no-op skips on both prod and staging. Deploy
  # previews (PRs into develop) inherit the staging site and always build.
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- apps/tangle-dapp/ libs/ package.json yarn.lock tsconfig.base.json nx.json && exit 0 || exit 1"

# ─── Cache headers ──────────────────────────────────────────────────────
#
# Vite emits hashed filenames into /assets, so the file at any given URL
# is content-addressed and safe to mark immutable. Repeat-visit loads
# become near-instant because the browser doesn't even revalidate.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fonts are also content-addressed when present; mark them immutable and
# permit cross-origin use so they can be loaded from sibling subdomains.
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

# index.html must NOT be cached aggressively — it's the entry point that
# references the hashed asset bundles, so it has to be replaced atomically
# on every deploy.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
